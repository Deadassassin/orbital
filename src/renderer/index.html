<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; media-src 'self' blob:; connect-src *; font-src 'self' data:; frame-src 'self' data: blob:; child-src 'self' data: blob:;">
  <title>Orbital</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Titlebar -->
    <div id="titlebar">
      <div id="orbital-brand">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><ellipse cx="12" cy="12" rx="8" ry="3" stroke="currentColor" stroke-width="1.5" transform="rotate(-30 12 12)"/><ellipse cx="12" cy="12" rx="8" ry="3" stroke="currentColor" stroke-width="1.5" transform="rotate(30 12 12)"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
        <span>Orbital</span>
      </div>
      <div id="titlebar-center">
        <div id="cmd-palette-trigger" title="Search or enter address (Ctrl+K)">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search or enter address...</span>
          <span class="kbd">Ctrl+K</span>
        </div>
      </div>
      <div id="window-controls">
        <button class="titlebar-btn" id="btn-minimize" title="Minimize">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="titlebar-btn" id="btn-maximize" title="Maximize">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
        <button class="titlebar-btn" id="btn-close" title="Close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Loading Bar -->
    <div id="loading-bar" class="hidden"><div id="loading-bar-inner"></div></div>

    <!-- Main Layout -->
    <div id="main-layout">
      <!-- Tab Sidebar -->
      <div id="tab-sidebar">
        <div id="tab-sidebar-header">
          <span class="label">Tabs</span>
          <button id="btn-sidebar-collapse" title="Collapse sidebar">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <input type="text" id="tab-filter" placeholder="Filter tabs..." spellcheck="false">
        <div id="tabs-list"></div>
        <button id="new-tab-btn">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Tab
        </button>
      </div>

      <!-- Content -->
      <div id="content">
        <!-- Navigation Bar (auto-shown on hover/cmd) -->
        <div id="nav-bar">
          <button class="nav-btn" id="nav-back" title="Back">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="nav-btn" id="nav-forward" title="Forward">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="nav-btn" id="nav-reload" title="Reload">
            <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button class="nav-btn" id="nav-home" title="Home">
            <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1V10"/></svg>
          </button>
          <div id="nav-url-container">
            <div id="nav-urlbar">
              <span id="security-indicator"></span>
              <input type="text" id="url-input" placeholder="Search or enter address..." spellcheck="false" autocomplete="off" autocorrect="off">
              <div id="urlbar-dropdown" class="hidden"></div>
            </div>
          </div>
          <button class="nav-btn" id="btn-bookmark" title="Bookmark this page">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button class="nav-btn" id="btn-extensions" title="Extensions">
            <svg viewBox="0 0 24 24"><path d="M20 12V8a2 2 0 0 0-2-2h-4"/><path d="M10 6H6a2 2 0 0 0-2 2v4"/><path d="M4 14v4a2 2 0 0 0 2 2h4"/><path d="M14 20h4a2 2 0 0 0 2-2v-4"/><circle cx="12" cy="12" r="2"/></svg>
          </button>
        </div>

        <!-- Tab Content -->
        <div id="tab-content-area">
          <div id="webview-container"></div>
          <div id="internal-pages" class="hidden"></div>
        </div>

        <!-- Side Panel -->
        <div id="side-panel" class="hidden">
          <div id="side-panel-header">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span id="side-panel-title">Side Panel</span>
            <button id="side-panel-close">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div id="side-panel-content"></div>
        </div>

        <!-- Find in Page -->
        <div id="find-bar" class="hidden">
          <input type="text" id="find-input" placeholder="Find in page...">
          <span id="find-count"></span>
          <button id="find-prev" title="Previous"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></button>
          <button id="find-next" title="Next"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button id="find-close" title="Close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>

        <!-- Sidebar toggle button (visible when sidebar collapsed) -->
        <button id="sidebar-toggle" title="Show tabs">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="statusbar" class="hidden">
      <span id="status-text"></span>
      <span id="status-zoom">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        100%
      </span>
    </div>
  </div>

  <!-- Command Palette Overlay -->
  <div id="cmd-palette-overlay" class="hidden">
    <div id="cmd-palette">
      <div id="cmd-input-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="cmd-input" placeholder="Search or enter address..." spellcheck="false" autocomplete="off" autocorrect="off">
      </div>
      <div id="cmd-results"></div>
    </div>
  </div>

  <!-- Tab Switcher -->
  <div id="tab-switcher" class="hidden">
    <div id="tab-switcher-grid"></div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden">
    <div id="context-menu-items"></div>
  </div>

  <!-- Download Notification -->
  <div id="download-notification" class="hidden">
    <div class="notif-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </div>
    <div class="notif-info">
      <div class="notif-title"></div>
      <div class="notif-body"></div>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/history.js"></script>
  <script src="js/toolbar.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
