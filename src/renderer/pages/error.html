<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Error - Orbital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;max-width:480px;padding:40px 24px}
.code{font-size:64px;font-weight:200;color:#444;margin-bottom:12px}
h2{font-weight:400;font-size:20px;margin-bottom:8px;color:#e8e8e8}
p{color:#777;font-size:14px;margin-bottom:6px;line-height:1.5;word-break:break-all}
.url{color:#555;font-size:12px;margin-bottom:20px}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 24px;border:1px solid #2a2a2a;border-radius:8px;background:#111;color:#e8e8e8;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#1a1a1a;border-color:#444}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
</style>
</head>
<body>
<div class="wrap">
  <div class="code" id="err-code">ERR</div>
  <h2 id="err-title">This page failed to load</h2>
  <p id="err-desc"></p>
  <p class="url" id="err-url"></p>
  <div class="btns">
    <a class="btn" href="javascript:window.location.reload()">
      <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Try Again
    </a>
    <a class="btn" href="about:newtab">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Tab
    </a>
  </div>
</div>
<script>
// Parse URL params
try {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code') || '';
  var desc = params.get('desc') || '';
  var url = params.get('url') || '';
  if (code) document.getElementById('err-code').textContent = code;
  if (desc) document.getElementById('err-title').textContent = desc;
  if (url) { document.getElementById('err-desc').textContent = 'Failed to load:'; document.getElementById('err-url').textContent = url; }
} catch(e) {}
</script>
</body>
</html>
