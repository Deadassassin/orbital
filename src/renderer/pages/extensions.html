<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Extensions</title>
<style>
  :root { --bg:#0a0a0a; --surface:#111; --elevated:#1a1a1a; --text:#e8e8e8; --text2:#888; --text3:#555; --accent:#e8e8e8; --border:#2a2a2a; --success:#22c55e; --danger:#ef4444; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; background:var(--bg); color:var(--text); padding:28px 40px; }
  h1 { font-size:22px; font-weight:300; letter-spacing:.3px; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
  .header-actions { margin-left:auto; display:flex; gap:6px; }
  .btn { padding:5px 14px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); cursor:pointer; font-size:11px; transition:all .15s; }
  .btn:hover { border-color:var(--text3); }
  .ext-card { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; transition:background .15s; }
  .ext-card:hover { background:var(--surface); }
  .ext-icon { width:36px; height:36px; border-radius:6px; background:var(--elevated); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .ext-info { flex:1; min-width:0; }
  .ext-name { font-size:13px; font-weight:500; }
  .ext-desc { font-size:11px; color:var(--text2); margin-top:1px; }
  .ext-meta { font-size:10px; color:var(--text3); margin-top:1px; }
  .ext-actions { display:flex; gap:6px; align-items:center; }
  .toggle { width:32px; height:18px; background:var(--border); border-radius:9px; cursor:pointer; transition:background .2s; flex-shrink:0; position:relative; }
  .toggle.active { background:var(--accent); }
  .toggle::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:#0a0a0a; border-radius:50%; transition:transform .2s; }
  .toggle.active::after { transform:translateX(14px); }
  .empty { text-align:center; padding:48px; color:var(--text2); font-size:13px; }
</style></head>
<body>
  <h1>Extensions
    <div class="header-actions">
      <button class="btn" onclick="load()">Refresh</button>
      <button class="btn" onclick="installExt()">Load Unpacked</button>
    </div>
  </h1>
  <div id="ext-list"></div>
  <script>
    const api = window.browserAPI;
    async function load() {
      const exts = await api.getExtensions() || [];
      const list = document.getElementById('ext-list');
      if (exts.length === 0) { list.innerHTML = '<div class="empty">No extensions installed</div>'; return; }
      list.innerHTML = exts.map(function(e){
        var iconHtml = e.icons && e.icons['128'] ? '<img src="'+e.icons['128']+'" style="width:28px;height:28px">' : '<svg viewBox="0 0 24 24" width="28" height="28" style="fill:none;stroke:var(--text2);stroke-width:2;"><path d="M20 12V8a2 2 0 0 0-2-2h-4"/><path d="M10 6H6a2 2 0 0 0-2 2v4"/><path d="M4 14v4a2 2 0 0 0 2 2h4"/><path d="M14 20h4a2 2 0 0 0 2-2v-4"/><circle cx="12" cy="12" r="2"/></svg>';
        return '<div class="ext-card"><div class="ext-icon">'+iconHtml+'</div><div class="ext-info"><div class="ext-name">'+e.name+' <span style="font-weight:400;font-size:11px;color:var(--text2)">v'+e.version+'</span></div><div class="ext-desc">'+(e.description||'No description')+'</div><div class="ext-meta">ID: '+e.id+' · Manifest V'+(e.manifestVersion||3)+'</div></div><div class="ext-actions"><div class="toggle '+(e.enabled?'active':'')+'" onclick="toggleExt(\''+e.id+'\')"></div><button class="btn" onclick="removeExt(\''+e.id+'\')" style="color:var(--danger)">Remove</button></div></div>';
      }).join('');
    }
    async function toggleExt(id) { await api.toggleExtension(id); load(); }
    async function removeExt(id) { if (confirm('Remove this extension?')) { await api.uninstallExtension(id); load(); } }
    async function installExt() {
      var result = await api.showOpenDialog({ properties: ['openDirectory'] });
      if (!result.canceled && result.filePaths[0]) {
        var res = await api.installExtension(result.filePaths[0]);
        if (res.success) { load(); alert('Extension installed: ' + res.extension.name); }
        else { alert('Failed: ' + (res.error || 'Invalid extension')); }
      }
    }
    load();
  </script>
</body>
</html>
