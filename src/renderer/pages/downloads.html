<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Downloads</title>
<style>
  :root { --bg:#0a0a0a; --surface:#111; --elevated:#1a1a1a; --text:#e8e8e8; --text2:#888; --text3:#555; --accent:#e8e8e8; --border:#2a2a2a; --success:#22c55e; --danger:#ef4444; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; background:var(--bg); color:var(--text); padding:28px 40px; }
  h1 { font-size:22px; font-weight:300; letter-spacing:.3px; margin-bottom:20px; }
  .download { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:6px; border:1px solid var(--border); margin-bottom:6px; transition:background .15s; }
  .download:hover { background:var(--surface); }
  .d-info { flex:1; min-width:0; }
  .d-name { font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .d-meta { font-size:11px; color:var(--text2); }
  .d-actions { display:flex; gap:4px; }
  .d-actions button { background:none; border:none; color:var(--text2); cursor:pointer; padding:3px 8px; border-radius:4px; font-size:11px; transition:all .15s; }
  .d-actions button:hover { background:var(--elevated); color:var(--text); }
  .empty { text-align:center; padding:48px; color:var(--text2); font-size:13px; }
  .progress-bar { width:100%; height:3px; background:var(--border); border-radius:2px; margin-top:4px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }
</style></head>
<body>
  <h1>Downloads</h1>
  <div id="downloads-list"></div>
  <script>
    const api = window.browserAPI;
    async function load() {
      const downloads = await api.getDownloads() || [];
      const list = document.getElementById('downloads-list');
      if (downloads.length === 0) { list.innerHTML = '<div class="empty">No downloads yet</div>'; return; }
      list.innerHTML = downloads.slice().reverse().map(function(d){
        var iconSvg = d.state === 'completed' ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' : d.state === 'progress' ? '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' : d.state === 'interrupted' ? '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' : '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>';
        return '<div class="download"><span style="flex-shrink:0;"><svg viewBox="0 0 24 24" width="18" height="18" style="stroke:var(--text2);fill:none;stroke-width:2;">'+iconSvg+'</svg></span><div class="d-info"><div class="d-name">'+(d.filename||d.url?.split('/').pop()||'Unknown')+'</div><div class="d-meta">'+(d.state==='completed'?(d.size?(d.size/1024/1024).toFixed(1)+' MB ':'')+'Complete':d.state==='progress'?'Downloading...':d.state==='interrupted'?'Failed':d.state||'')+'</div>'+(d.state==='progress'&&d.percent?'<div class="progress-bar"><div class="progress-fill" style="width:'+d.percent+'%"></div></div>':'')+'</div><div class="d-actions">'+(d.path?'<button onclick="window.openFile(\''+d.path.replace(/'/g,"\\'")+'\')">Open</button><button onclick="window.showFile(\''+d.path.replace(/'/g,"\\'")+'\')">Show</button>':'')+'<button onclick="removeDownload(\''+d.id+'\')">Remove</button></div></div>';
      }).join('');
    }
    window.openFile = function(p) { api.openPath(p); };
    window.showFile = function(p) { api.showItemInFolder(p); };
    async function removeDownload(id) { await api.removeDownload(id); load(); }
    load();
  </script>
</body>
</html>
